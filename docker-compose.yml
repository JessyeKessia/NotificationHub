version: "3.9"

services:

  broker1:
    build: .
    container_name: broker1
    ports:
      - "8081:8080"
    environment:
      - BROKER_ID=broker1

  broker2:
    build: .
    container_name: broker2
    ports:
      - "8082:8080"
    environment:
      - BROKER_ID=broker2

  broker3:
    build: .
    container_name: broker3
    ports:
      - "8083:8080"
    environment:
      - BROKER_ID=broker3